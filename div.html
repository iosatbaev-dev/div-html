<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div</title>
    <style>
        .box {
            background-color: green;
            width: 100px;
            height: 100px;
        }

        .green {
            background-color: green;
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }

        .border {
            border: 1px solid;
            width: 300px;
            height: 90px;
            padding: 10px;
        }

        .title {
            font-family: Arial;
        }

        .install {
            background-color: rgb(54, 52, 52);
            width: 300px;
            height: 100px;
            padding: 10px;
        }

        .white {
            font-family: Arial;
            font-weight: 700;
            color: white;
        }

        .addmusic {
            color: rgb(157, 168, 164);
        }
    </style>
</head>

<body>
    <!-- 1-tapsirma -->
    <div class="box"></div>

    <hr>
    <!-- 2-tapsirma -->
    <div class="green"></div>

    <hr>
    <!-- 3-tapsirma -->
    <div class="border">
        <p class="title">Xizmetimizden kewliniz toldima?</p>
        <button>Awa</button>
        <button>Yaq</button>
    </div>

    <hr>
    <!-- 4-tapsirma -->
    <div class="install">
        <p class="white">Install YouTube Music</p>
        <p class="addmusic">Add YouTube Music to your desktop for quick and easy access</p>
    </div>
</body>

</html>
